<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; }
    h3 { margin: 0; font-family: 'Courier New', Courier, monospace; }
    .container { display: flex; padding: 20px; gap: 20px; }
    .products { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 15px; }
    .product { background: white; padding: 10px; border-radius: 10px; }
    .product img { width: 100%; border-radius: 10px; }
    .cart { flex: 1; background: white; padding: 15px; border-radius: 10px; }
    button { padding: 8px; border: none; background: #4CAF50; color: white; cursor: pointer; border-radius: 5px; }
    .qty-btn { padding: 3px 6px; margin: 0 3px; }
    footer { text-align: center; padding: 10px; background: #222; color: white; margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <h2>Shop</h2>
  <div>Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="container">
  <div class="products" id="products"></div>

  <div class="cart">
    <h3>Cart</h3>
    <div id="cart-items"></div>
    <h4>Total: $<span id="total">0</span></h4>
    <button onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<script src="script.js" defer></script>
<footer>
  <p>&copy; 2026 My Shop. All rights reserved.by Denzel Anyiko</p>
</footer>
</body>
</html>
